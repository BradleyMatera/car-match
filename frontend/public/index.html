    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "CarMatch",
        "url": "https://bradleymatera.github.io/car-match/",
        "logo": "https://bradleymatera.github.io/car-match/logo512.png",
        "description": "Community platform for automotive enthusiasts to plan events, join forums, and connect with drivers.",
        "areaServed": "United States",
        "sameAs": [
          "https://www.instagram.com/",
          "https://www.facebook.com/"
        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "CarMatch",
        "url": "https://bradleymatera.github.io/car-match/",
        "description": "Find car shows, join automotive forums, discover local auto shops, and connect with car enthusiasts.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://bradleymatera.github.io/car-match/#/events?query={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is CarMatch?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "CarMatch is a community platform for automotive enthusiasts to discover car events, join discussion forums, find local auto shops, and connect with other car lovers."
            }
          },
          {
            "@type": "Question",
            "name": "How do I find car shows near me?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Visit the Events page on CarMatch to browse real car shows, cars and coffee meets, track days, and other automotive events sourced from across the United States."
            }
          },
          {
            "@type": "Question",
            "name": "Can I find auto repair shops on CarMatch?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, the Shops directory features real automotive businesses including repair shops, parts stores, performance shops, detailing services, and towing companies near Davis, Illinois."
            }
          },
          {
            "@type": "Question",
            "name": "Is CarMatch free to use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, CarMatch is free to join. Create an account to participate in forums, RSVP to events, list parts in the marketplace, and connect with the community."
            }
          }
        ]
      }
    </script>
