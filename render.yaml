# DEPRECATED — the backend no longer runs on Render.
# Current backend deploy target is Google Cloud Run. See docs/DEPLOYMENT.md
# and backend/Dockerfile. This file is kept for historical reference only;
# do not use it for deploys. Safe to delete once no longer needed.
services:
  - type: web
    name: car-match-backend
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    plan: free
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: TOKEN_VERSION
        value: "1"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MONGODB_URI
        sync: false
    autoDeploy: true
